name: tests

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '**.rst'
      - 'docs/**'
      - 'Makefile'
      - 'LICENSE'
      - 'scripts/benchmarks/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '**.rst'
      - 'docs/**'
      - 'Makefile'
      - 'LICENSE'
      - 'scripts/benchmarks/**'

env:
  UV_FROZEN: "1"

jobs:
  lint-format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          version: "0.9.27"
      - name: Run lint
        run: uvx ruff@0.14.14 check --diff
      - name: Run format
        run: uvx ruff@0.14.14 format --diff

  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          version: "0.9.27"
      - name: Restore Warp kernel cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/warp
          key: warp-kernels-${{ runner.os }}-${{ runner.arch }}-${{ matrix.python-version }}-${{ hashFiles('uv.lock', 'mjlab/**/*.py') }}
          restore-keys: |
            warp-kernels-${{ runner.os }}-${{ runner.arch }}-${{ matrix.python-version }}-
      - name: Test with python ${{ matrix.python-version }}
        run: uv run --extra cpu pytest

  pyright:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          version: "0.9.27"
      - name: Test with python ${{ matrix.python-version }}
        run: uv run --extra cpu pyright

  ty-check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          version: "0.9.27"
      - name: Type check with python ${{ matrix.python-version }}
        run: uv run --extra cpu ty check

  stubs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          version: "0.9.27"
      - name: Sync environment
        run: uv sync --extra cpu
      - name: Regenerate MuJoCo stubs
        run: bash typings/generate_mujoco_stubs.sh
      - name: Verify stubs are up to date
        run: |
          if ! git diff --exit-code typings/mujoco; then
            echo "::error::MuJoCo type stubs are out of date. Run 'make stubs' and commit the result."
            exit 1
          fi
